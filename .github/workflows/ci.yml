name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: --severity=warning

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: "--help prints usage"
        run: bash areDevicesAtHome.sh -h | grep -q "Synopsis"
      - name: "invalid option is rejected"
        run: |
          if bash areDevicesAtHome.sh --bogus >/dev/null 2>&1; then
            echo "expected a non-zero exit for a bad option"; exit 1
          fi
